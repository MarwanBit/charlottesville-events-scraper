services:
  db:
    image: postgres:16
    container_name: charlottesville_db
    # Reclaim stuck connections: kill idle-in-transaction after 60s so "too many clients" recovers
    command: postgres -c max_connections=200 -c idle_in_transaction_session_timeout=20000
    environment:
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: charlottesville_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://events:events@db:5432/events
      HTTP_PROXY:  http://host.docker.internal:8888
      HTTPS_PROXY: http://host.docker.internal:8888
    volumes:
      - .:/app
    ports:
      - "5900:5900"   # VNC when running scripts/run-headed-vnc.sh (headed browser)
    # Keep container running (no pipeline). Run manually: docker compose exec app python -m src.app
    command: ["sleep", "infinity"]
    restart: unless-stopped

volumes:
  pgdata: